<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamVerse - TMDB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav id="navbar">
        <div class="nav-left">
            <h1 class="logo">STREAM<span>VERSE</span></h1>
            <ul class="nav-links">
                <li onclick="app.showHome()">Inicio</li>
                <li onclick="app.showMovies()">Películas</li>
                <li onclick="app.showSeries()">Series</li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Títulos, personas, géneros...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </nav>

    <main id="app">
        </main>

    <div id="modal" class="modal">
        </div>

    <script src="script.js"></script>
</body>
</html>
